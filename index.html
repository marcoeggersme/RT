<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unterschrift</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 10px;
}

canvas {
    border: 2px solid #333;
    border-radius: 10px;
    touch-action: none;
}

button {
    margin: 10px;
    padding: 12px 20px;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>Bitte unterschreiben</h2>

<canvas id="canvas" width="350" height="200"></canvas><br>

<button onclick="clearCanvas()">Löschen</button>
<button onclick="saveSignature()">Speichern</button>

<p id="result"></p>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;

canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchend", stop);
canvas.addEventListener("touchmove", draw);

canvas.addEventListener("mousedown", start);
canvas.addEventListener("mouseup", stop);
canvas.addEventListener("mousemove", draw);

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches) {
        return {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top
        };
    } else {
        return {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
        };
    }
}

function start(e) {
    drawing = true;
    draw(e);
}

function stop() {
    drawing = false;
    ctx.beginPath();
}

function draw(e) {
    if (!drawing) return;

    const pos = getPos(e);
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "black";

    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);

    e.preventDefault();
}

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function saveSignature() {

    const dataURL = canvas.toDataURL("image/png");

    // Name generieren (Zeitstempel)
    const timestamp = new Date().getTime();
    const fileName = "signatur_" + timestamp + ".png";

    // Download auslösen
    const link = document.createElement("a");
    link.href = dataURL;
    link.download = fileName;
    link.click();

    // Anzeige für Nutzer
    document.getElementById("result").innerHTML =
        "✔ Unterschrift gespeichert: " + fileName;

    // Optional: Daten in URL übergeben (für Integration)
    console.log("SIGNATUR_NAME=" + fileName);
}
</script>

</body>
</html>
